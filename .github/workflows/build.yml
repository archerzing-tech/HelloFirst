name: Build APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK with Gradle
        run: ./gradlew assembleDebug

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "APK name: TaskPlan-v${VERSION}.apk"

      - name: Rename APK with version
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/TaskPlan-v${{ steps.version.outputs.version }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskPlan-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/debug/TaskPlan-v${{ steps.version.outputs.version }}.apk
          retention-days: 90

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: TaskPlan-v${{ steps.version.outputs.version }}
          path: apk

      - name: Generate release info
        id: info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.info.outputs.tag }}
          name: TaskPlan ${{ steps.info.outputs.tag }}
          body: |
            ## TaskPlan ${{ steps.info.outputs.tag }}

            下载 APK 进行安装：
            - 支持 Android 10+
            - 首次安装后直接打开即可
            - 更新安装请直接覆盖安装
          draft: false
          prerelease: false
          files: apk/TaskPlan-v${{ steps.version.outputs.version }}.apk
